<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outpost Posted — Proxie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #EAF0F8; color: #1a1a1a;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      max-width: 420px; width: 100%; margin: 24px; background: #fff;
      border-radius: 20px; padding: 40px 32px; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon {
      width: 64px; height: 64px; border-radius: 32px; background: #E8F8EE;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
      font-size: 30px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.3px; }
    p { font-size: 14px; line-height: 1.6; color: #555; margin-bottom: 24px; }
    .btn {
      display: inline-block; background: #5B9BD5; color: #fff; text-decoration: none;
      font-weight: 700; font-size: 15px; padding: 14px 28px; border-radius: 14px;
    }
    .fallback { font-size: 12px; color: #999; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Outpost fee paid</h1>
    <p>
      Your Outpost listing will go live automatically once you arrive at the
      scheduled location and time. You can close this tab and return to Proxie.
    </p>
    <a class="btn" id="openApp" href="#">Return to Proxie</a>
    <p class="fallback">If the app doesn't open automatically, switch back to it from your home screen.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const listingId = params.get('listing_id') || '';
    const deepLink = 'proxie://outpost-success?listing_id=' + encodeURIComponent(listingId);
    document.getElementById('openApp').href = deepLink;
    setTimeout(function () { window.location.href = deepLink; }, 600);
  </script>
</body>
</html>
